import cv2
from pyzbar.pyzbar import decode

cap = cv2.VideoCapture(0)

while True:
    _, frame = cap.read()

    codes = decode(frame)

    if codes:
        print("Scanned:", codes[0].data.decode())

    cv2.imshow("Scanner", frame)

    if cv2.waitKey(1) == ord('q'):
        break
