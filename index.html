<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Attendance</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      padding: 1.5rem;
      width: 100%;
      max-width: 360px;
      margin-bottom: 1rem;
    }

    #reader { width: 100% !important; border-radius: 10px; overflow: hidden; }
    #reader video { border-radius: 10px; }

    .scan-btn {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .scan-btn:hover { background: #333; }
    .scan-btn.stop  { background: #e8e8e8; color: #111; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.5rem 0;
      color: #bbb;
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    .manual-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.65rem 0.85rem;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.85rem;
      outline: none;
      background: #fafafa;
      color: #111;
    }
    input[type="text"]:focus { border-color: #111; }

    .submit-btn {
      padding: 0.65rem 1rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #333; }

    #status {
      font-size: 0.82rem;
      text-align: center;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      background: #f5f5f5;
      color: #888;
      margin-top: 1rem;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #status.success { background: #edf7f2; color: #2a7a50; }
    #status.late    { background: #fdf6e3; color: #b07a20; }
    #status.error   { background: #fdf0ee; color: #c0392b; }
  </style>
</head>
<body>
  <h1>📋 Attendance</h1>

  <div class="card">
    <div id="reader"></div>
    <button class="scan-btn" id="scanBtn" onclick="toggleScanner()">Start Scanner</button>

    <div class="divider">or enter ID manually</div>

    <div class="manual-row">
      <input type="text" id="manualId" placeholder="Enter ID..." onkeydown="if(event.key==='Enter') submitManual()" />
      <button class="submit-btn" onclick="submitManual()">Submit</button>
    </div>

    <div id="status">Waiting...</div>
  </div>

<script>
  const AIRTABLE_API_KEY = "patYz5lRtzfBTgvye.b921f2436359b7988d4a8eaf9086cbc324f00ebf19f29cf1323b886c78dd7551";
  const BASE_ID          = "app5ijYL6JzH9alCV";
  const TABLE_NAME       = "Student Attendance";
  const QR_FIELD         = "AutoID";
  const STATUS_FIELD     = "Status";
  const LATE_AFTER       = "08:30";

  let scanner        = null;    
  let scannerRunning = false;    //determines if camera is on
  let lastScan       = null;    //Prevents scans from duplicating
  let cooldown       = false;  //Delay between scans

  function getStatus() {
    const [h, m] = LATE_AFTER.split(":").map(Number);         //Splits 8:30 into 8 and 30 and compares to the current time to determine whether present or late.
    const cutoff = new Date();
    cutoff.setHours(h, m, 0, 0);
    return new Date() > cutoff ? "Late" : "Present";
  }

  function setStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = type;                                 //Determines whether it's a success/late/error and displays present/late/or error
    el.textContent = msg;
  }

  async function markAttendance(value) {
    value = value.trim();                               //removes spaces from numbers to prevent any issues
    setStatus("", "Looking up record...");
    console.log("Looking up scanned value:", JSON.stringify(value));

    try {
      const res = await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}` +
        `?filterByFormula=${encodeURIComponent(`{${QR_FIELD}}="${value}"`)}`,            //Goes into airtable to look for the scanned value that corresponds to my table and
        { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } }                    
      );
      const data = await res.json();
      console.log("Airtable response:", data); // debug

      if (!data.records?.length) {                                                   //if value isn't found then itll display error, if it is found then itll continue
        setStatus("error", `No record found for: ${value}`);
        return;
      }

      const recordId = data.records[0].id;                                  
      const status   = getStatus();

      const upd = await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}/${recordId}`,          
        {
          method: "PATCH",                                                                           //Goes into airtable to look for the scanned value again
          headers: {
            Authorization: `Bearer ${AIRTABLE_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ fields: { [STATUS_FIELD]: status } })
        }
      );

      if (!upd.ok) throw new Error("Update failed");                                                           //if record was found but nothing is updated, itll display update failed

      setStatus(status === "Late" ? "late" : "success", `Marked ${status}: ${value}`);                       //if found, then marked present/late

    } catch (e) {
      setStatus("error", e.message || "Something went wrong");
    }
  }

  async function toggleScanner() {                                               //This allows for the scanner to be toggled on and off
    const btn = document.getElementById("scanBtn");

    if (scannerRunning) {
      await scanner.stop();                                                   //if the scanner is on, then itll continue the block 
      scannerRunning = false;                                                 //allows for camera to be toggled off if camera is on
      btn.textContent = "Start Scanner";
      btn.classList.remove("stop");
      return;
    }

    if (typeof Html5Qrcode === "undefined") {
      setStatus("error", "QR library not loaded. Check your internet connection.");
      return;
    }

    try {
      scanner = new Html5Qrcode("reader");

      await scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 220 },
        (decodedText) => onScanSuccess(decodedText)
      );

      scannerRunning = true;
      btn.textContent = "Stop Scanner";                           //When the scanner is on, the button will update to stop scanner
      btn.classList.add("stop");

    } catch (err) {
      setStatus("error", "Camera error: " + (err.message || "Check permissions & use HTTPS"));           //If no camera is found then itll display this message.
    }
  }

  function onScanSuccess(qr) {
    if (cooldown || qr === lastScan) return;
    cooldown = true;
    lastScan = qr;                                                               //When a qr is scanned, it'll have a cooldown before scanning another one and remember the value of the previous scanned to prevent dupes.
    markAttendance(qr);
    setTimeout(() => { cooldown = false; lastScan = null; }, 3000);
  }

  function submitManual() {
    const val = document.getElementById("manualId").value.trim();
    if (!val) return;                                                         //if qr cant be scanned then user can resort to inputting a value
    document.getElementById("manualId").value = "";
    markAttendance(val);
  }
</script>
</body>
</html>
