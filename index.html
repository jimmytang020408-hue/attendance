<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Attendance</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 600;
      color: #111;
      margin-bottom: 2rem;
      letter-spacing: -0.01em;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      padding: 1.5rem;
      width: 100%;
      max-width: 360px;
      margin-bottom: 1rem;
    }

    #reader { width: 100% !important; border-radius: 10px; overflow: hidden; }
    #reader video { border-radius: 10px; }

    .scan-btn {
      width: 100%;
      padding: 0.75rem;
      margin-top: 1rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .scan-btn:hover { background: #333; }
    .scan-btn.stop  { background: #e8e8e8; color: #111; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 0.5rem 0;
      color: #bbb;
      font-size: 0.75rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e8e8e8;
    }

    .manual-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.65rem 0.85rem;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.85rem;
      outline: none;
      background: #fafafa;
      color: #111;
    }
    input[type="text"]:focus { border-color: #111; }

    .submit-btn {
      padding: 0.65rem 1rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .submit-btn:hover { background: #333; }

    #status {
      font-size: 0.82rem;
      text-align: center;
      padding: 0.65rem 1rem;
      border-radius: 10px;
      background: #f5f5f5;
      color: #888;
      margin-top: 1rem;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }
    #status.success { background: #edf7f2; color: #2a7a50; }
    #status.late    { background: #fdf6e3; color: #b07a20; }
    #status.error   { background: #fdf0ee; color: #c0392b; }
  </style>
</head>
<body>
  <h1>📋 Attendance</h1>

  <div class="card">
    <div id="reader"></div>
    <button class="scan-btn" id="scanBtn" onclick="toggleScanner()">Start Scanner</button>

    <div class="divider">or enter ID manually</div>

    <div class="manual-row">
      <input type="text" id="manualId" placeholder="Enter ID..." onkeydown="if(event.key==='Enter') submitManual()" />
      <button class="submit-btn" onclick="submitManual()">Submit</button>
    </div>

    <div id="status">Waiting...</div>
  </div>

<script>
  //Constants used for further purposes
  const AIRTABLE_API_KEY = "patYz5lRtzfBTgvye";
  const BASE_ID          = "app5ijYL6JzH9alCV";
  const TABLE_NAME       = "Student Attendance";
  const QR_FIELD         = "QR";
  const STATUS_FIELD     = "Status";
  const LATE_AFTER       = "08:30";

  let scanner = null;
  let scannerRunning = false;
  let lastScan = null, cooldown = false;
// This declares whether a student is late or present depending on the time frame in which it was scanned
  function getStatus() {
    const [h, m] = LATE_AFTER.split(":").map(Number);
    const cutoff = new Date();
    cutoff.setHours(h, m, 0, 0);
    return new Date() > cutoff ? "Late" : "Present";
  }
// Updates the status box on the screen
  function setStatus(type, msg) {
    const el = document.getElementById("status");
    el.className = type;
    el.textContent = msg;
  }
//Shows a loading message while matching the data scanned with AirTable
  async function markAttendance(value) {
    setStatus("", "Looking up record...");
//This will send a request to Airtable to find the scanned qr code and return the data
    try {
      const res = await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}` +
        `?filterByFormula=${encodeURIComponent(`{${QR_FIELD}}="${value}"`)}`,
        { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } }
      );
      const data = await res.json();
//If no value is found, then it'll set the status as error and show that no record is found for that specific value
      if (!data.records?.length) {
        setStatus("error", `No record found for: ${value}`);
        return;
      }
// Get Airtable record ID and determine if student is present or late
      const recordId = data.records[0].id;
      const status   = getStatus();
// Send request to Airtable to update the student's Status field
// Then show success message if update works, otherwise show error
      const upd = await fetch(
        `https://api.airtable.com/v0/${BASE_ID}/${encodeURIComponent(TABLE_NAME)}/${recordId}`,
        {
          method: "PATCH",
          headers: {
            Authorization: `Bearer ${AIRTABLE_API_KEY}`,
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ fields: { [STATUS_FIELD]: status } })
        }
      );

      if (!upd.ok) throw new Error("Update failed");

      setStatus(status === "Late" ? "late" : "success", `Marked ${status}: ${value}`);

    } catch (e) {
      setStatus("error", e.message || "Something went wrong");
    }
  }

  // QR scanner
  function toggleScanner() {
    if (scannerRunning) {
      scanner.clear();
      scannerRunning = false;
      document.getElementById("scanBtn").textContent = "Start Scanner";
      document.getElementById("scanBtn").classList.remove("stop");
    } else {
      if (!scanner) {
        scanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 220 });
      }
      scanner.render(onScanSuccess, () => {});
      scannerRunning = true;
      document.getElementById("scanBtn").textContent = "Stop Scanner";
      document.getElementById("scanBtn").classList.add("stop");
    }
  }

  function onScanSuccess(qr) {
    if (cooldown || qr === lastScan) return;
    cooldown = true;
    lastScan = qr;
    markAttendance(qr);
    setTimeout(() => { cooldown = false; lastScan = null; }, 3000);
  }

  // Manual entry
  function submitManual() {
    const val = document.getElementById("manualId").value.trim();
    if (!val) return;
    document.getElementById("manualId").value = "";
    markAttendance(val);
  }
</script>
</body>
</html>
